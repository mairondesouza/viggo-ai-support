<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viggo AI Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1e1b4b;
    }

    .header {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      padding: 16px;
      color: white;
    }

    .header-titulo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .header-sub {
      font-size: 11px;
      opacity: 0.8;
    }

    .corpo {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-card {
      background: #f8f7ff;
      border: 1.5px solid #e0e7ff;
      border-radius: 10px;
      padding: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    .status-label {
      color: #6b7280;
      font-weight: 500;
    }

    .status-valor {
      font-weight: 600;
      color: #4f46e5;
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d5db;
    }

    .status-dot.online { background: #22c55e; }
    .status-dot.offline { background: #ef4444; }
    .status-dot.checking { background: #f59e0b; }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primario {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
    }

    .btn-primario:hover { background: linear-gradient(135deg, #4f46e5, #3730a3); }

    .btn-secundario {
      background: white;
      color: #4f46e5;
      border: 1.5px solid #e0e7ff;
    }

    .btn-secundario:hover { background: #f0ecff; }

    .btn-grupo {
      display: flex;
      gap: 8px;
    }

    .btn-grupo .btn { flex: 1; }

    .divider {
      height: 1px;
      background: #f0ecff;
    }

    .footer {
      padding: 10px 16px;
      text-align: center;
      font-size: 10px;
      color: #9ca3af;
      background: #fafafa;
      border-top: 1px solid #f0ecff;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-titulo">
    🤖 Viggo AI Support
  </div>
  <div class="header-sub">Base de conhecimento inteligente</div>
</div>

<div class="corpo">

  <!-- Status da conexão -->
  <div class="status-card">
    <div class="status-row">
      <span class="status-label">AnythingLLM</span>
      <span class="status-indicator">
        <span class="status-dot checking" id="status-dot"></span>
        <span id="status-texto">Verificando...</span>
      </span>
    </div>
    <div class="status-row" style="margin-top: 6px">
      <span class="status-label">Workspace ativo</span>
      <span class="status-valor" id="workspace-ativo">suporte</span>
    </div>
  </div>

  <!-- Ações principais -->
  <div class="btn-grupo">
    <button class="btn btn-primario" id="btn-abrir-painel">
      📋 Abrir painel
    </button>
    <button class="btn btn-secundario" id="btn-abrir-anythingllm">
      🌐 Abrir AI
    </button>
  </div>

  <div class="divider"></div>

  <!-- Configurações rápidas -->
  <button class="btn btn-secundario" id="btn-configuracoes">
    ⚙️ Configurações
  </button>

</div>

<div class="footer">
  Viggo AI Support v1.0.0
</div>

<script src="popup.js"></script>
</body>
</html>
